<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan SDN 2 Tegalsari</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SECTION -->
    <div id="login-section" class="container section active">
        <!-- Pastikan file gambar logo berada di folder yang sama dengan HTML ini -->
        <img src="Logo Warna SDN 2 Tegalsari (1).png" alt="Logo Sekolah" id="school-logo" onclick="handleLogoClick()">
        <h2>Pengumuman Kelulusan</h2>
        <p>Silakan masukkan data diri Anda</p>
        
        <form id="login-form">
            <div class="form-group">
                <label for="nisn">NISN</label>
                <input type="text" id="nisn" placeholder="Masukkan NISN" required>
            </div>
            <div class="form-group">
                <label for="dob">Tanggal Lahir</label>
                <input type="date" id="dob" required>
            </div>
            <button type="submit">LIHAT PENGUMUMAN</button>
        </form>
    </div>

    <!-- COUNTDOWN SECTION -->
    <div id="countdown-section" class="container section">
        <div id="countdown-number">3</div>
    </div>

    <!-- RESULT SECTION -->
    <div id="result-section" class="container section">
        <img src="Logo Warna SDN 2 Tegalsari (1).png" alt="Logo Sekolah" style="width: 80px;">
        <div class="result-title" id="result-message">
            <!-- Pesan kelulusan akan muncul di sini -->
        </div>
        <div class="result-box">
            <h3>Capaian Nilai TKA</h3>
            <p><strong>Matematika:</strong> <span id="val-math"></span></p>
            <p><strong>Bahasa Indonesia:</strong> <span id="val-bi"></span></p>
        </div>
        <button onclick="location.reload()" style="margin-top: 30px; background-color: #6c757d;">KEMBALI</button>
    </div>

    <!-- ADMIN DASHBOARD SECTION -->
    <div id="admin-section" class="container section">
        <div class="admin-controls">
            <h2>Panel Admin</h2>
            <button onclick="location.reload()" style="width:auto; background-color: #6c757d;">Keluar</button>
        </div>
        
        <!-- Form Tambah Data -->
        <form class="add-form" id="add-student-form">
            <input type="text" id="add-nisn" placeholder="NISN" required>
            <input type="text" id="add-nama" placeholder="Nama Lengkap" required>
            <input type="date" id="add-dob" required>
            <input type="text" id="add-math" placeholder="Nilai Matematika" required>
            <input type="text" id="add-bi" placeholder="Nilai B. Indonesia" required>
            <button type="submit">Tambah Siswa</button>
        </form>

        <!-- Tabel Data Siswa -->
        <table>
            <thead>
                <tr>
                    <th>NISN</th>
                    <th>Nama</th>
                    <th>Tgl Lahir</th>
                    <th>Matematika</th>
                    <th>B. Indonesia</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="student-table-body">
                <!-- Data akan dirender di sini -->
            </tbody>
        </table>
    </div>

    <!-- MODAL LOGIN ADMIN -->
    <div id="admin-modal" class="modal">
        <div class="modal-content" style="position: relative;">
            <span class="close-btn" onclick="closeAdminModal()">&times;</span>
            <h3>Login Admin</h3>
            <div class="form-group">
                <input type="text" id="admin-user" placeholder="Username">
            </div>
            <div class="form-group">
                <input type="password" id="admin-pass" placeholder="Password">
            </div>
            <button onclick="verifyAdmin()">Masuk</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
